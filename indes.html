<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div id="bg">
        <h1>TODO</h1>
  <input id="input" type="text" placeholder="  Today Work">
    <button id="btn" onclick="click1()">TASK</button>
    
     <div id="font"> </div>
    </div>
   
  
    <script>
        var r= document.getElementById("input")
        var count = 1;
        r.addEventListener('keypress',function(event){
            if (event.key === 'Enter' && r.value.trim()!==''){
                click1();
                r.value='';
            }
        });
       
    function click1(){
        
        let s = document.createElement("h2");
        var list =document.getElementById("font");
        s.innerHTML = `
          <span> ${count} </span> <span> ${r.value}  </span>
        <button onclick="remve(event)">x</button>`;
        
        s.className = "task";
        list.append(s);
        count++;
         
}
function remve(e){
    e.target.parentElement.remove();
    // Renumber the remaining tasks
    const tasks = document.querySelectorAll('.task');
    tasks.forEach((task, index) => {
        const numberSpan = task.querySelector('span:first-child');
        numberSpan.textContent = index + 1;
    });
}
    </script>
</body>
</html>
